<title>Vodafone Idea x Contentsquare - Access Controlled</title>
<style>
  :root {
    --bg-1:#0e1133; --bg-2:#1a1849; --vi:#e60000; --csq:#7341ff;
    --line:rgba(255,255,255,.12); --muted:#9aa0c4; --text:#fff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:
    radial-gradient(900px 500px at 80% 20%, rgba(115,65,255,.35), transparent 60%),
    radial-gradient(700px 500px at 20% 80%, rgba(230,0,0,.30), transparent 60%),
    linear-gradient(180deg,#0e1133 0%, #1a1849 100%);
    color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  .gate-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{
    background:rgba(255,255,255,.05);
    border:1px solid var(--line);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:22px;padding:36px 36px;max-width:440px;width:100%;
    box-shadow:0 24px 60px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    text-align:center;
  }
  .gate-mark{
    width:56px;height:56px;border-radius:50%;background:var(--vi);color:#fff;
    font-weight:900;font-size:22px;display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(230,0,0,.4);margin-bottom:20px;letter-spacing:-.5px;
  }
  .gate-mark::after{content:"";display:block;width:10px;height:10px;border-radius:50%;background:#fff;margin-left:-7px}
  .gate-card h1{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.3px}
  .gate-card .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .gate-card .hint{color:var(--muted);font-size:12.5px;margin:0 0 18px;line-height:1.5}
  form{display:flex;flex-direction:column;gap:10px}
  input[type=password]{
    background:rgba(255,255,255,.06);border:1px solid var(--line);
    color:#fff;font-size:15px;padding:12px 14px;border-radius:10px;outline:none;
    transition:border-color .15s ease, background .15s ease;
  }
  input[type=password]:focus{border-color:#7341ff;background:rgba(115,65,255,.08)}
  input[type=password]::placeholder{color:rgba(255,255,255,.4)}
  button{
    background:linear-gradient(135deg,#e60000 0%,#7341ff 100%);color:#fff;border:0;
    font-size:14px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;
    box-shadow:0 6px 18px rgba(115,65,255,.32);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 22px rgba(115,65,255,.45)}
  button:active:not(:disabled){transform:translateY(0)}
  button:disabled{opacity:.6;cursor:wait}
  #err{color:#ff9c9c;font-size:12.5px;margin-top:12px;min-height:18px;font-weight:600}
  .gate-footer{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;letter-spacing:.3px}
  .gate-footer b{color:#cdd1ec}
</style>
</head>

  <script>
  async function unlock(){
    const pw = document.getElementById('pw').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('unlockBtn');
    if(!pw){ err.textContent = 'Enter the password'; return; }
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Unlocking...';
    try {
      const b64 = document.getElementById('payload').textContent.trim();
      const bin = atob(b64);
      const raw = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) raw[i]=bin.charCodeAt(i);
      const salt = raw.slice(0,16);
      const iv   = raw.slice(16,28);
      const ct   = raw.slice(28); // ciphertext + auth tag (last 16 bytes)
      const keyMat = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(pw), {name:'PBKDF2'}, false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        {name:'PBKDF2', salt, iterations: 250000, hash:'SHA-256'},
        keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']
      );
      const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
      const html = new TextDecoder().decode(plain);
      document.documentElement.lang = 'en';
      document.title = 'Vodafone Idea - CSQ Business Value Case';
      document.body.innerHTML = html;
      // Re-execute scripts (innerHTML does not run them)
      document.body.querySelectorAll('script').forEach(s => {
        const ns = document.createElement('script');
        for (const a of s.attributes) ns.setAttribute(a.name, a.value);
        ns.textContent = s.textContent;
        s.parentNode.replaceChild(ns, s);
      });
    } catch(e){
      btn.disabled = false; btn.textContent = 'Unlock';
      err.textContent = 'Wrong password. Try again.';
      const i = document.getElementById('pw');
      i.value = ''; i.focus();
    }
  }
  document.getElementById('gateForm').addEventListener('submit', e => { e.preventDefault(); unlock(); });
  </script>
